# SFT (Supervised Fine-Tuning) data pipeline config
#
# SFT data is fundamentally different from pre-training web data:
# - Short answers can be perfect ("2+2=4")
# - Code output has no punctuation, stopwords, or high alpha ratio
# - Structured/list responses have natural repetition
#
# Therefore: NO Gopher/C4/FineWeb heuristic filters here.
# Quality is measured by SFT-specific rules + LLM scoring (Layer 2).

pipeline:
  text_field: "text"

  filters:
    - name: sft_rules
      params:
        instruction_field: instruction
        output_field: output
        min_output_words: 5
        min_output_words_closed_form: 1  # Short answers OK for classification/extraction
        min_instruction_words_for_short_check: 20
        max_copy_similarity: 0.80
        min_words_after_refusal: 50  # "As an AI..." with real content = not a refusal

    - name: pii
      mode: detect  # Detect only — don't redact SFT data

  # --- LLM Judge (Layer 2) ---
  llm:
    api_url: ~
    api_key: ~
    model: ~
    samples: 50

  dedup:
    exact: true
    minhash:
      enabled: false  # Disabled for SFT data
