# SFT (Supervised Fine-Tuning) data pipeline config
# Lighter filtering for instruction-following data:
# - Lower word count minimum (short Q&A pairs are valid)
# - No C4 terminal punct filter (code responses lack punctuation)
# - PII detection only (don't redact — might corrupt code)
# - No MinHash dedup (intentional rephrasing is fine)

pipeline:
  text_field: "text"

  filters:
    - name: length
      params:
        min_words: 10
        max_words: 50000

    - name: gopher_quality
      params:
        min_words: 10             # SFT data is short — lower threshold
        max_words: 50000
        min_avg_word_len: 2
        max_avg_word_len: 15
        max_symbol_ratio: 0.3     # Code has more symbols
        min_lines_end_punct: 0.0  # Code doesn't end with punct
        min_stopwords: 0          # Code/short answers may lack stopwords
        min_alpha_ratio: 0.5      # Code has more non-alpha chars

    - name: gopher_repetition
      params:
        max_top_2gram: 0.30       # Relaxed for structured data
        max_top_3gram: 0.25
        max_top_4gram: 0.20
        max_dup_line_ratio: 0.40
        max_dup_para_ratio: 0.40
        max_char_repetition: 1.0  # Disabled for SFT — char n-gram repetition is designed for long pre-training docs

    - name: fineweb
      params:
        max_list_line_ratio: 0.95  # Lists are common in SFT
        max_dup_line_ratio: 0.50
        min_avg_line_len: 10
        max_short_line_count: 50   # Code has many short lines

    - name: pii
      mode: detect  # Detect only — don't redact SFT data

  # --- DEITA SFT scoring (Phase 2) ---
  # These are scorers, not pipeline filters. Use `dq score` command
  # or the Python API to apply DEITA scoring.
  #
  # deita:
  #   complexity:
  #     model: "gpt-4o-mini"
  #     api_url: null              # Set for local vLLM endpoint
  #     api_key: null              # Uses OPENAI_API_KEY env var if null
  #   quality:
  #     model: "gpt-4o-mini"
  #     api_url: null
  #     api_key: null
  #   diversity:
  #     model_name: "BAAI/bge-small-en-v1.5"
  #     threshold: 0.95

  dedup:
    exact: true
    minhash:
      enabled: false  # Disabled for SFT data
