pipeline:
  text_field: "text"

  filters:
    # ── Arxiv-specific (clean-then-judge, must be first) ──
    - name: arxiv
      params:
        max_latex_residual: 0.05
        require_abstract: false
        min_sections: 2

    # ── Gopher quality (thresholds relaxed for academic text) ──
    - name: gopher_quality
      params:
        min_avg_word_len: 3
        max_avg_word_len: 10
        max_symbol_ratio: 0.1
        max_ellipsis_lines_ratio: 0.3
        min_stopwords: 2             # academic text has fewer stopwords
        min_alpha_ratio: 0.4         # pandoc markdown + math lowers alpha ratio

    - name: gopher_repetition
      enabled: false  # academic papers have high ngram repetition from tables/formulas

    - name: c4
      params:
        remove_no_terminal_punct: false  # headings and math lines don't end with punct
        remove_javascript_lines: true
        remove_policy_lines: true
        remove_lorem_ipsum: true
        remove_curly_brace: false
        min_sentences: 3             # papers may have short sections

    - name: language
      enabled: false   # requires fasttext: uv sync --extra lid
      params:
        languages: ["en"]
        language_threshold: 0.5
        backend: "ft176"

    - name: badwords
      enabled: false   # academic papers discuss harmful topics legitimately
      params:
        default_language: "en"

    - name: pii
      mode: redact

  dedup:
    exact: true
    minhash:
      enabled: true
      num_perm: 112
      bands: 14
      rows: 8
      ngram_size: 5

# ── Compute backend (optional) ──
# backend: "local" (default, single-machine multiprocessing + threading)
#          "dask"  (distributed; requires `pip install dask[distributed]`)
#          "ray"   (distributed; requires `pip install ray`)
compute:
  backend: local
  # cpu_workers: 16           # override default (cpu_count / 4, capped at 32)
  # io_workers: 8             # threads for LLM / HF downloads
  # For Dask:
  #   scheduler_address: "tcp://scheduler:8786"   # external cluster, or
  #   n_workers: 8                                # else LocalCluster size
  # For Ray:
  #   address: "ray://head:10001"                 # or null for local cluster

# ── Arxiv-specific config (read by runner, not by PipelineConfig) ──
arxiv:
  version: v2025-04
  data_source: "togethercomputer/RedPajama-v2"
  hf_endpoint: "https://hf-mirror.com"
  subset: "arxiv"

  phase1:
    min_text_length: 200
    max_latex_residual: 0.20
    preview_length: 500

  quality_scoring:
    enabled: false        # opt-in; runs after dedup/contamination
    method: llm           # "llm" (LLM judge) or "classifier" (local BERT)
    # LLM judge knobs (when method=llm)
    sample_size: 0        # 0 = score every surviving doc; N = score N random docs
    min_quality: high     # "high" rejects LOW-scored docs; "low" keeps all (tag only)
    workers: 8            # concurrent LLM API calls
    max_chars: 3000       # truncate each doc before sending
    # Classifier knobs (when method=classifier, fineweb-edu by default)
    model: HuggingFaceFW/fineweb-edu-classifier
    min_score: 3.0        # keep docs with score >= this (0..5 scale)
    device: auto          # "auto" | "cpu" | "cuda"
    batch_size: 32

  phase3:
    version_dedup: true

  phase4:
    ngram_size: 13
    threshold: 0.8
    benchmarks:
      - mmlu
      - gsm8k
      - hellaswag
      - arc
      - humaneval
      - truthfulqa

  phase5:
    shard_target_bytes: 1073741824  # 1GB
    sort_by: "id"

  parallelism:
    num_workers: null
    chunk_size: 1000
