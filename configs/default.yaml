pipeline:
  text_field: "text"

  filters:
    - name: gopher_quality
      params:
        min_avg_word_len: 3
        max_avg_word_len: 10
        max_symbol_ratio: 0.1
        min_lines_end_punct: 0.1
        min_stopwords: 2
        min_alpha_ratio: 0.8

    - name: gopher_repetition
      params:
        max_top_2gram: 0.20
        max_top_3gram: 0.18
        max_top_4gram: 0.16
        max_dup_line_ratio: 0.30
        max_dup_para_ratio: 0.30
        # Gopher Table A1: duplicate word n-gram character fraction
        max_dup_5gram_frac: 0.15
        max_dup_6gram_frac: 0.14
        max_dup_7gram_frac: 0.13
        max_dup_8gram_frac: 0.12
        max_dup_9gram_frac: 0.11
        max_dup_10gram_frac: 0.10

    - name: c4
      params:
        remove_no_terminal_punct: true
        remove_javascript_lines: true
        remove_policy_lines: true
        remove_lorem_ipsum: true
        remove_curly_brace: false
        min_sentences: 3

    - name: fineweb
      params:
        line_punct_thr: 0.12
        short_line_thr: 0.67
        short_line_length: 30
        char_duplicates_ratio: 0.01
        new_line_ratio: 0.3

    - name: language
      enabled: false
      params:
        languages: null            # null = any language above threshold
        language_threshold: 0.65
        backend: "ft176"           # "ft176" (176-lang) or "glotlid" (1000+)
        label_only: false

    - name: badwords
      enabled: false
      params:
        default_language: "en"

    - name: pii
      mode: redact

    # --- Model-based filters (Phase 2) ---
    # Uncomment to enable. Requires: uv sync --extra model

    # - name: fasttext_quality
    #   enabled: false
    #   params:
    #     model_path: ""           # Path to trained .bin model
    #     threshold: 0.5
    #     label: "__label__hq"

    # - name: perplexity
    #   enabled: false
    #   params:
    #     model_name: "Qwen/Qwen2-0.5B"
    #     max_perplexity: 1000
    #     min_perplexity: 5
    #     device: "auto"

    # - name: llm_quality
    #   enabled: false
    #   params:
    #     model_name: "HuggingFaceFW/fineweb-edu-classifier"
    #     threshold: 3.0
    #     device: "auto"

  # --- LLM Judge (Layer 2) ---
  # Credentials are loaded from configs/llm.yaml (gitignored).
  # See configs/llm.yaml.example for setup instructions.
  # CLI args (--api-url, --api-key, --model) and env vars also work as overrides.

  dedup:
    exact: true
    minhash:
      enabled: true
      num_perm: 112
      bands: 14
      rows: 8
      ngram_size: 5
